<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This webpage will be a dashboard that will display live information and simulated infrastructure data. Core concepts: networking, system health, APIs, data flow"
    />
    <meta name="author" content="Christian Ventura" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/ui.js" defer></script>
    <title>InfraScope</title>
  </head>
  <body>
    <header class="layout-nav">
      <nav id="nav">
        <ul>
          <!-- There will be one big ui element that will bew changed based on the selection of the "placeholder button" -->
          <!-- The placeholder button will allow for a state change. 
          The UI element will alter and display the chosen selection dynamically.
          I want the text to drastically change in size,
          then allow for switching (the word will dynamically change) based on the section to be displayed. 
          -->
          <li>
            <button>Placeholder</button>
          </li>
          <li><a href="#dashboard">Dashboard</a></li>
          <li><a href="#data-viewer">Data</a></li>
          <li><a href="#storage">Preferences</a></li>
        </ul>
      </nav>
    </header>

    <main class="layout-main">
      <section id="hero" class="layout-fullscreen">
        <h1 class="ui-title">InfraScope</h1>
        <p class="ui-subtitle">Observe your systems</p>
      </section>

      <section id="dashboard" class="layout-container">
        <h2 class="ui-section-title">Dashboard</h2>

        <section id="tools" class="layout-grid">
          <section id="data-viewer">
            <h3>&gt;&gt; Systems</h3>
            <div id="systems-container"></div>
          </section>

          <section id="storage">
            <h3>&gt;&gt; Storage</h3>
          </section>

          <section id="carousel">
            <h3>&gt;&gt; Feed</h3>
          </section>
        </section>
      </section>
    </main>
    <footer>Copyright &copy; christian_Ventura_2026</footer>
  </body>
</html>
