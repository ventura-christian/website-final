<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This webpage will be a dashboard that will display live information and simulated infrastructure data. Core concepts: networking, system health, APIs, data flow"
    />
    <meta name="author" content="Christian Ventura" />
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/app.js" defer></script>
    <title>InfraScope</title>
  </head>
  <body data-mode="dashboard">
    <header class="layout-nav">
      <nav class="nav">
        <div class="nav-control">
          <button id="nav-toggle" class="nav-trigger" data-text="MODE">
            MODE
          </button>

          <ul id="nav-menu" class="nav-menu">
            <li><a href="#" data-mode="dashboard">Dashboard</a></li>
            <li><a href="#" data-mode="storage">Storage</a></li>
            <li><a href="#" data-mode="feed">Feed</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="layout-main">
      <section id="hero" class="layout-fullscreen">
        <h1 class="ui-title">InfraScope</h1>
        <p class="ui-subtitle">Observe your systems</p>
      </section>

      <!-- rework the layout for the dashboard stage-->

      <section id="dashboard" class="layout-container">
        <h2 class="ui-section-title">
          Dashboard
          <span id="mode-label">[SYSTEMS]</span>
        </h2>

        <p class="ui-context">Active view updates based on selected mode.</p>

        <div class="dashboard-stage">
          <div class="dashboard-noise"></div>
          <div class="dashboard-glyphs"></div>

          <section id="tools" class="layout-grid dashboard-content">
            <section id="data-viewer" data-view="dashboard">
              <h3>&gt;&gt; Systems</h3>
              <div id="systems-container"></div>
              <!-- section will display "online", "degraded", "offline" -->
            </section>

            <section id="storage" data-view="storage">
              <h3>&gt;&gt; Storage</h3>
            </section>

            <section id="carousel" data-view="feed">
              <h3>&gt;&gt; Feed</h3>
            </section>
          </section>
        </div>
      </section>
    </main>
    <footer>Copyright &copy; christian_Ventura_2026</footer>
  </body>
</html>
